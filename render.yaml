services:
  - type: web
    name: crm-backend
    region: frankfurt
    plan: free
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: crm-postgres
          property: connectionString
      - key: REDIS_URL
        fromRedis:
          name: crm-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_TTL
        value: 7d
      - key: REFRESH_TOKEN_PEPPER
        generateValue: true
      - key: BOT_TOKEN
        value: 7000000000:AAFakeDevTokenForLocalDevelopment
      - key: BOT_USERNAME
        value: crm_dev_bot
      - key: MINIO_USE_SSL
        value: "false"
      - key: RATE_LIMIT_GLOBAL_PER_MIN
        value: 100
      - key: RATE_LIMIT_AUTH_PER_MIN
        value: 10
      - key: RATE_LIMIT_WS_MSG_PER_MIN
        value: 30

databases:
  - name: crm-postgres
    region: frankfurt
    plan: free
    databaseName: crm
    user: crm

  - name: crm-redis
    region: frankfurt
    plan: free
